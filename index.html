/* ── SwipeRow ── */
function SwipeRow({children,onDelete,onReAdd,swipeKey,activeSwipe,setActiveSwipe}){
  const [tx,setTx]=useState(0);
  const startX=useRef(null);
  const W=152;
  const open=useCallback(()=>{setTx(-W);setActiveSwipe(swipeKey);},[swipeKey]);
  const close=useCallback(()=>{setTx(0);setActiveSwipe(null);},[]);
  useEffect(()=>{if(activeSwipe!==swipeKey&&tx!==0)close();},[activeSwipe]);
  const onTS=e=>{startX.current=e.touches[0].clientX;};
  const onTM=e=>{
    if(startX.current===null)return;
    const dx=e.touches[0].clientX-startX.current;
    setTx(Math.max(-W,Math.min(0,tx+dx)));
    startX.current=e.touches[0].clientX;
  };
  const onTE=()=>{tx<-W/2?open():close();startX.current=null;};
  const onMD=e=>{startX.current=e.clientX;};
  const onMM=e=>{
    if(startX.current===null)return;
    const dx=e.clientX-startX.current;
    if(Math.abs(dx)<3)return;
    setTx(Math.max(-W,Math.min(0,tx+dx)));
    startX.current=e.clientX;
  };
  const onMU=()=>{tx<-W/2?open():close();startX.current=null;};
  return(
    <div style={{position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",right:0,top:0,bottom:0,width:W,display:"flex"}}>
        <button onClick={()=>{close();setTimeout(onReAdd,150);}}
          style={{flex:1,background:BLUE,border:"none",color:"#fff",
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
          <Icon d={IC.repeat} size={18} stroke="#fff" sw={2}/>
          <span style={{fontSize:10,fontWeight:600}}>Re-Add</span>
        </button>
        <button onClick={()=>{close();setTimeout(onDelete,150);}}
          style={{flex:1,background:RED,border:"none",color:"#fff",
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
          <Icon d={IC.trash} size={18} stroke="#fff" sw={2}/>
          <span style={{fontSize:10,fontWeight:600}}>Delete</span>
        </button>
      </div>
      <div style={{transform:`translateX(${tx}px)`,transition:startX.current===null?"transform .25s ease":"none",
        background:"#fff",position:"relative",userSelect:"none"}}
        onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}>
        {children}
      </div>
    </div>
  );
}

/* ── SizeTag ── */
function SizeTag({currentSize,onChangeSize}){
  const [open,setOpen]=useState(false);
  const toggle=e=>{e.stopPropagation();setOpen(o=>!o);};
  const pick=(e,s)=>{e.stopPropagation();onChangeSize(s);setOpen(false);};
  return(
    <div style={{display:"flex",background:"#F2F2F7",borderRadius:7,padding:2,gap:2}}
      onClick={e=>e.stopPropagation()}>
      {open
        ?["S","M","L"].map(s=>(
          <button key={s} onClick={e=>pick(e,s)}
            style={{padding:"3px 9px",borderRadius:5,border:"none",cursor:"pointer",
              fontSize:12,fontWeight:700,
              background:s===currentSize?BLUE:"transparent",
              color:s===currentSize?"#fff":"#8E8E93",
              transition:"background .15s,color .15s"}}>
            {s}
          </button>
        ))
        :<button onClick={toggle}
          style={{padding:"3px 9px",borderRadius:5,border:"none",cursor:"pointer",
            fontSize:12,fontWeight:700,background:"transparent",color:"#8E8E93"}}>
          {currentSize}
        </button>
      }
    </div>
  );
}

/* ── EnergyBar ── */
function EnergyBar({current,goal}){
  const pct=Math.min((current/goal)*100,100);
  const [w,setW]=useState(0);
  useEffect(()=>{setTimeout(()=>setW(pct),120);},[pct]);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontSize:13,color:"#8E8E93"}}>Today's Fuel</span>
        <span style={{fontSize:13,color:"#8E8E93"}}>
          <span style={{color:"#000",fontWeight:600}}>{current.toLocaleString()}</span> / {goal.toLocaleString()} kcal
        </span>
      </div>
      <div style={{height:10,background:"#E5E5EA",borderRadius:5,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:5,width:`${w}%`,
          background:pct>90?RED:pct>70?ORANGE:BLUE,
          transition:"width 0.9s cubic-bezier(0.16,1,0.3,1)"}}/>
      </div>
    </div>
  );
}

  const handleStar=(e,food)=>{
    e.stopPropagation();
    if(freqFoodIds.has(food.id)){onRemoveFreq(food.id);setStarToast("Removed");}
    else{onAddFreq(food);setStarToast("Added to Frequently Logged ★");}
    setTimeout(()=>setStarToast(null),1800);
  };

  return(
    <div style={{background:"#F2F2F7",minHeight:"100%",paddingBottom:90}}>
      {/* header */}
      <div style={{background:"#fff",paddingTop:52,borderBottom:"1px solid #E5E5EA"}}>
        <div style={{padding:"0 20px 12px",display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:BLUE,fontSize:17,padding:0}}>Cancel</button>
          <div style={{flex:1,background:"#F2F2F7",borderRadius:10,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
            <Icon d={IC.search} size={15} stroke="#8E8E93" sw={2}/>
            <input ref={inputRef} value={query} onChange={e=>handleQuery(e.target.value)}
              placeholder="Search food..."
              style={{flex:1,background:"none",border:"none",outline:"none",fontSize:15,color:"#000"}}/>
            {query&&<button onClick={()=>handleQuery("")} style={{background:"none",border:"none",padding:0}}>
              <Icon d={IC.x} size={14} stroke="#8E8E93" sw={2}/>
            </button>}
          </div>
        </div>
        {/* category chips — manual drag scroll to bypass phone shell overflow:hidden */}
        {(()=>{
          const dragRef=useRef(null);
          const isDragging=useRef(false);
          const startX=useRef(0);
          const scrollLeft=useRef(0);

          const onMD=e=>{
            isDragging.current=true;
            startX.current=e.pageX||e.touches?.[0]?.pageX||0;
            scrollLeft.current=dragRef.current.scrollLeft;
          };
          const onMM=e=>{
            if(!isDragging.current)return;
            const x=e.pageX||e.touches?.[0]?.pageX||0;
            dragRef.current.scrollLeft=scrollLeft.current-(x-startX.current);
          };
          const onMU=()=>{ isDragging.current=false; };

          return(
            <div ref={dragRef}
              onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
              onTouchStart={onMD} onTouchMove={onMM} onTouchEnd={onMU}
              style={{
                display:"flex",gap:8,padding:"0 16px 14px",
                overflowX:"scroll",scrollbarWidth:"none",
                WebkitOverflowScrolling:"touch",
                cursor:"grab", userSelect:"none",
              }}>
              {CATEGORIES.map(cat=>{
                const isActive=activeCat===cat.id;
                return(
                  <button key={cat.id}
                    onClick={()=>{ setActiveCat(cat.id); setQuery(""); }}
                    style={{
                      flexShrink:0,padding:"6px 14px",borderRadius:20,border:"none",
                      background:isActive?BLUE:"#F2F2F7",
                      color:isActive?"#fff":"#555",
                      fontSize:13,fontWeight:isActive?700:500,
                      cursor:"pointer",
                      display:"flex",alignItems:"center",gap:5,
                      transition:"background .15s,color .15s",
                      whiteSpace:"nowrap",
                    }}>
                    {cat.emoji&&<span style={{fontSize:14}}>{cat.emoji}</span>}
                    {cat.label}
                  </button>
                );
              })}
            </div>
          );
        })()}
      </div>

      {starToast&&(
        <div style={{background:"rgba(0,0,0,0.78)",padding:"10px 20px",
          display:"flex",alignItems:"center",gap:8,animation:"fadeUp .15s ease"}}>
          <span style={{fontSize:13,fontWeight:600,color:"#000"}}>{starToast}</span>
        </div>
      )}

      <div style={{background:"#fff",marginTop:16}}>
        <div style={{padding:"10px 20px 4px",fontSize:11,color:"#8E8E93",fontWeight:600,letterSpacing:"0.05em"}}>{sectionLabel}</div>
        {list.length===0
          ?<div style={{padding:"28px 20px",textAlign:"center",color:"#C7C7CC",fontSize:14}}>No food in this category yet</div>
          :list.map((food,i)=>{
            const isFreq=freqFoodIds.has(food.id);
            return(
              <div key={food.id}>
                <div style={{display:"flex",alignItems:"center",animation:"fadeUp .15s ease both",animationDelay:`${i*0.03}s`}}>
                  <button onClick={e=>handleStar(e,food)}
                    style={{flexShrink:0,width:44,background:"none",border:"none",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      padding:"0 0 0 16px",alignSelf:"stretch"}}>
                    <svg width={20} height={20} viewBox="0 0 24 24"
                      fill={isFreq?ORANGE:"none"} stroke={isFreq?ORANGE:"#C7C7CC"}
                      strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round">
                      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                  </button>
                  <button onClick={()=>onSelect(food)}
                    style={{flex:1,background:"none",border:"none",padding:"13px 16px 13px 10px",
                      display:"flex",justifyContent:"space-between",alignItems:"center",
                      cursor:"pointer",textAlign:"left"}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:600,color:"#000"}}>{food.name}</div>
                      <div style={{fontSize:12,color:"#8E8E93",marginTop:2}}>{food.sub}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,marginLeft:8}}>
                      <span style={{fontSize:13,color:"#8E8E93"}}>{food.kcal.M} kcal</span>
                      <Icon d={IC.chevR} size={16} stroke="#C7C7CC" sw={2}/>
                    </div>
                  </button>
                </div>
                {i<list.length-1&&<Divider/>}
              </div>
            );
          })
        }
      </div>
    </div>
  );
}

function SuccessScreen({food,size,count,onDone,onAddMore}){

  const t=(delay,extra={})=>({opacity:shown?1:0,transition:`opacity 0.4s ease ${delay}s`,...extra});
  return(
    <div style={{background:"#fff",minHeight:"100%",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      padding:"40px 32px",textAlign:"center"}}>
      <div style={{width:80,height:80,borderRadius:"50%",
        background:shown?BLUE:"#E5E5EA",
        display:"flex",alignItems:"center",justifyContent:"center",

        <Icon d={IC.check} size={38} stroke="#fff" sw={2}/>
      </div>
      <div style={{fontSize:26,fontWeight:700,color:"#000",letterSpacing:"-0.4px",marginBottom:8,
        ...t(0.15,{transform:shown?"translateY(0)":"translateY(10px)",transition:"all 0.4s ease 0.15s"})}}>
        {count>1?`${count} Items Logged!`:"Fuel Logged!"}
      </div>
      <div style={{fontSize:16,color:"#8E8E93",marginBottom:6,...t(0.25)}}>
        {food.name} · {PORTION_INFO[size].label}
      </div>
      <div style={{fontSize:24,fontWeight:700,color:BLUE,marginBottom:32,...t(0.3)}}>
        +{food.kcal[size]} kcal
      </div>
      <div style={{background:"#F2F2F7",borderRadius:14,padding:"16px 24px",marginBottom:32,width:"100%",...t(0.4)}}>
        <div style={{fontSize:14,color:"#8E8E93",marginBottom:6}}>Tonight's session</div>
        <div style={{fontSize:16,fontWeight:600,color:"#000"}}>You're fueled. Ready to lift. 💪</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",...t(0.5)}}>
        <button onClick={onAddMore}
          style={{width:"100%",height:50,background:"#fff",border:`1.5px solid ${BLUE}`,borderRadius:12,color:BLUE,fontSize:17,fontWeight:600}}>
          + Add More Food
        </button>
        <button onClick={onDone}
          style={{width:"100%",height:50,background:BLUE,border:"none",borderRadius:12,color:"#fff",fontSize:17,fontWeight:600}}>
          Done
        </button>
      </div>
    </div>
  );
}

      items:[
        {name:"Rolled Oats",size:"M",kcal:300,p:10,c:54,f:6},
        {name:"Chicken Breast",size:"L",kcal:340,p:72,c:0,f:7},
        {name:"Whey Isolate",size:"S",kcal:110,p:25,c:2,f:1},
      ],
      totals:{kcal:750,p:107,c:56,f:14},
    },
    {
      id:"h2",
      date:"2026-03-19",
      dateLabel:"Wednesday, Mar 19",
      items:[
        {name:"Whole Eggs",size:"M",kcal:140,p:12,c:1,f:10},
        {name:"Brown Rice",size:"M",kcal:220,p:5,c:45,f:2},
        {name:"Salmon",size:"M",kcal:250,p:34,c:0,f:14},
        {name:"Banana",size:"S",kcal:53,p:1,c:14,f:0},
      ],
      totals:{kcal:663,p:52,c:60,f:26},
    },
    {
      id:"h3",
      date:"2026-03-18",
      dateLabel:"Tuesday, Mar 18",
      items:[
        {name:"Greek Yogurt",size:"M",kcal:130,p:17,c:9,f:2},
        {name:"Whey Isolate",size:"M",kcal:220,p:50,c:4,f:2},
        {name:"Sweet Potato",size:"M",kcal:180,p:4,c:42,f:0},
      ],
      totals:{kcal:530,p:71,c:55,f:4},
    },
  ]);

  const handleConfirm=(food,size,again)=>{
    const entry={uid:uid(),foodId:food.id,name:food.name,sub:food.sub,
      size,kcal:food.kcal[size],p:food.p[size],c:food.c[size],f:food.f[size],time:nowStr()};
    setTodayLog(prev=>[entry,...prev]);
    setSelFood(food);setSelSize(size);
    setSessionCount(prev=>prev+1);
    if(again)setScreen("search");
    else setScreen("success");
  };

  // save today's log to history when clicking Done on success screen
  const saveTodayToHistory=()=>{
    if(todayLog.length===0)return;
    const today=new Date();
    const label=today.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});
    const dateStr=today.toISOString().slice(0,10);
    const tot=calcTotals(todayLog);
    const session={
      id:uid(), date:dateStr, dateLabel:label,
      items:todayLog.map(i=>({name:i.name,size:i.size,kcal:i.kcal,p:i.p,c:i.c,f:i.f})),
      totals:tot,
    };
    setFuelHistory(prev=>[session,...prev]);
  };

  const renderContent=()=>{
    if(tab==="profile")   return <Placeholder d={IC.user}     title="Profile"/>;
    if(tab==="history")   return <HistoryScreen fuelHistory={fuelHistory}/>;
    if(tab==="exercises") return <Placeholder d={IC.dumbbell} title="Exercises"/>;
    if(tab==="measure")   return <Placeholder d={IC.ruler}    title="Measure"/>;
    if(tab==="home")      return <HomeScreen onLogFuel={goFuel}/>;
    if(tab==="fuel"){
      if(screen==="dashboard")return(
        <FuelDashboard
          onSearch={()=>setScreen("search")}
          todayLog={todayLog} freqLog={freqLog} totals={totals}
          onDeleteLog={deleteLog} onReAddLog={reAddLog}
          onDeleteFreq={deleteFreq} onReAddFreq={reAddFreq}
          onChangeSizeLog={changeSizeLog} onChangeSizeFreq={changeSizeFreq}
        />
      );
      if(screen==="search")return(
        <SearchScreen
          onSelect={f=>{setSelFood(f);setScreen("portion");}}
          onBack={()=>setScreen("dashboard")}
          freqNames={freqNames} freqFoodIds={freqFoodIds}
          onAddFreq={addFreq} onRemoveFreq={removeFreq}
        />
      );
      if(screen==="portion")return(
        <PortionPicker food={selFood} onConfirm={handleConfirm} onBack={()=>setScreen("search")}/>
      );
      if(screen==="success")return(
        <SuccessScreen food={selFood} size={selSize} count={sessionCount}
          onDone={()=>{saveTodayToHistory();setTab("home");setScreen("dashboard");setSessionCount(0);}}
          onAddMore={()=>setScreen("search")}/>
      );
    }
  };

  const displayTab=tab==="fuel"?"home":tab;

  return(
    <div style={{minHeight:"100vh",background:"#1C1C1E",display:"flex",alignItems:"center",
      justifyContent:"center",padding:"20px 0"}}>
      <div data-phone="1" style={{width:375,height:812,background:"#F2F2F7",borderRadius:52,
        overflow:"hidden",position:"relative",
        boxShadow:"0 0 0 10px #2C2C2E,0 0 0 12px #3A3A3C,0 40px 100px rgba(0,0,0,0.6)",
        border:"1px solid #3A3A3C"}}>
        <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",
          width:126,height:34,background:"#000",
          borderBottomLeftRadius:20,borderBottomRightRadius:20,zIndex:200}}/>
        <div style={{position:"absolute",top:0,left:0,right:0,height:44,
          display:"flex",justifyContent:"space-between",alignItems:"flex-end",
          padding:"0 28px 6px",zIndex:150,pointerEvents:"none"}}>
          <span style={{fontSize:12,fontWeight:600,color:"#000"}}>9:41</span>
          <span style={{fontSize:10,color:"#000"}}>●●●</span>
        </div>
        <div style={{position:"absolute",inset:0,overflowY:"auto",overflowX:"hidden"}}>
          {renderContent()}
        </div>
        {toast&&(
          <div style={{position:"absolute",top:58,left:"50%",transform:"translateX(-50%)",
            background:"rgba(0,0,0,0.82)",borderRadius:20,padding:"9px 18px",
            display:"flex",alignItems:"center",gap:8,zIndex:300,
            animation:"fadeUp .2s ease",whiteSpace:"nowrap"}}>
            <Icon d={IC.check} size={14} stroke={GREEN} sw={2.5}/>
            <span style={{fontSize:13,fontWeight:600,color:"#fff"}}>{toast} added ✓</span>
          </div>
        )}
        <TabBar active={displayTab} onChange={t=>{setTab(t);if(t==="home")setScreen("dashboard");}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
